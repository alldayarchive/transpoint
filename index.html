<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TransPoint PRO | Global AI Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    
    <!-- [AD 1, 2] Adstella Header (Commented for testing)
    <script src="https://pl29018797.profitablecpmratenetwork.com/79/bd/2b/79bd2b3532f7c91f511989459e2c6acf.js"></script>
    <script src="https://pl29018799.profitablecpmratenetwork.com/5c/15/cb/5c15cbfea47513cdbf0692fbc831931e.js"></script>
    -->

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #020617; color: #f8fafc; scroll-behavior: smooth; }
        .digital-panel { background: #0f172a; border: 1px solid #1e293b; border-radius: 2.5rem; }
        .neon-glow { border: 1px solid #2563eb; box-shadow: 0 0 50px rgba(37,99,235,0.1); }
        .node-card { background: #0f172a; border: 1px solid #1e293b; border-radius: 1.5rem; height: 130px; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: 0.3s; }
        .node-card:hover { border-color: #2563eb; transform: translateY(-5px); }
        .master-monitor { background: rgba(15, 23, 42, 0.5); border: 2px solid #1e293b; border-radius: 2.5rem; padding: 2.5rem; min-height: 250px; font-family: 'Inter', sans-serif; }
        .coffee-box { background: linear-gradient(135deg, #FFDD00 0%, #FBBF24 100%); color: #000; border-radius: 2.5rem; max-width: 550px; margin: 0 auto; border: 4px solid white; }
        select { background: #1e293b; border: 1px solid #334155; border-radius: 0.75rem; padding: 0.5rem 1rem; color: white; outline: none; font-size: 0.75rem; }
    </style>
</head>
<body class="p-6 selection:bg-blue-600">

    <nav class="max-w-6xl mx-auto flex justify-between items-center h-20 mb-16 px-4">
        <div class="text-3xl font-black italic tracking-tighter text-blue-500">TransPoint <span class="text-white">PRO</span></div>
        <div class="hidden md:flex space-x-12 text-[10px] font-black uppercase tracking-widest text-slate-500">
            <a href="#advantages">Technology</a><a href="/pricing" class="text-blue-500">Console ($11)</a><a href="/support">Support</a>
        </div>
        <button id="openConfig" class="w-10 h-10 bg-slate-800 rounded-xl border border-slate-700 text-slate-400 hover:text-white transition shadow-lg"><i class="fa-solid fa-sliders text-lg"></i></button>
    </nav>

    <main class="max-w-5xl mx-auto">
        <!-- ANALYZER -->
        <section class="digital-panel overflow-hidden mb-8 shadow-2xl">
            <textarea id="inputText" class="w-full h-64 p-10 bg-transparent text-2xl font-bold outline-none placeholder:text-slate-800 resize-none" placeholder="Paste lyrics or signal..."></textarea>
            <div class="p-8 bg-black/30 border-t border-slate-800 flex flex-wrap justify-between items-center gap-6">
                <div class="flex flex-wrap items-center gap-4">
                    <select id="srcLang"><option value="Korean">Korean</option><option value="English">English</option><option value="Japanese">Japanese</option></select>
                    <i class="fa-solid fa-link text-slate-700"></i>
                    <select id="targetLang"><option value="English">English</option><option value="Korean">Korean</option><option value="Japanese">Japanese</option></select>
                    <select id="pMode" class="text-blue-400 font-bold border-blue-900">
                        <option value="learn">Learn: 헬로우 (Konglish)</option>
                        <option value="teach">Teach: Annyeong (Romanized)</option>
                    </select>
                </div>
                <button onclick="executeAnalysis()" id="runBtn" class="bg-blue-600 text-white px-12 py-4 rounded-2xl font-black uppercase text-xs tracking-widest shadow-xl">Analyze Now</button>
            </div>
        </section>

        <div class="flex justify-between px-4 mb-16"><span id="buffer" class="text-[10px] font-black text-slate-600 uppercase italic">Signal Buffer: 0 / 100</span><div id="statusTag" class="text-[9px] font-bold text-blue-500 uppercase bg-blue-500/10 px-4 py-1.5 rounded-full border border-blue-500/20">Standard Tier</div></div>

        <!-- [RESULTS] -->
        <section id="resultArea" class="hidden mb-24 animate-in fade-in zoom-in-95 duration-500">
            <div class="digital-panel border-2 border-blue-600/30 p-8 md:p-12 relative overflow-hidden">
                <div class="flex flex-wrap justify-between items-center gap-6 mb-10 border-b border-slate-800 pb-8">
                    <div class="flex gap-8">
                        <label class="flex items-center space-x-2 text-[10px] font-black text-slate-500 uppercase cursor-pointer hover:text-white transition"><input type="checkbox" id="shOri" checked onchange="renderUI()" class="accent-blue-600 w-4 h-4"> <span>Original</span></label>
                        <label class="flex items-center space-x-2 text-[10px] font-black text-blue-400 uppercase cursor-pointer hover:text-white transition"><input type="checkbox" id="shPho" checked onchange="renderUI()" class="accent-blue-600 w-4 h-4"> <span>Phonetic</span></label>
                        <label class="flex items-center space-x-2 text-[10px] font-black text-slate-500 uppercase cursor-pointer hover:text-white transition"><input type="checkbox" id="shTra" checked onchange="renderUI()" class="accent-blue-600 w-4 h-4"> <span>Meaning</span></label>
                    </div>
                    <button onclick="copyMaster()" class="bg-slate-800 text-white px-8 py-2 rounded-xl text-[10px] font-black hover:bg-blue-600 transition">Copy All</button>
                </div>
                <div id="masterMonitor" class="master-monitor text-2xl md:text-3xl font-bold leading-relaxed selection:bg-blue-600 whitespace-pre-wrap"></div>
            </div>
        </section>

        <!-- Nodes -->
        <section class="grid grid-cols-2 gap-4 mb-24">
            <a href="NordVPN_Link" target="_blank" class="node-card group"><div class="w-12 h-12 bg-blue-600 text-white rounded-2xl flex items-center justify-center text-xl mb-2 transition group-hover:rotate-12"><i class="fa-solid fa-shield-halved"></i></div><span class="text-[10px] font-black uppercase text-slate-500">NordVPN</span></a>
            <a href="NordPass_Link" target="_blank" class="node-card group"><div class="w-12 h-12 bg-slate-700 text-white rounded-2xl flex items-center justify-center text-xl mb-2 transition group-hover:rotate-12"><i class="fa-solid fa-key"></i></div><span class="text-[10px] font-black uppercase text-slate-500">NordPass</span></a>
        </section>

        <!-- PRO Center Section -->
        <section id="pro-section" class="max-w-3xl mx-auto py-24 px-10 digital-panel border-2 border-blue-600 text-center shadow-3xl mb-32 relative overflow-hidden">
            <h2 class="text-4xl font-black mb-6 italic tracking-tighter uppercase">Activate Unlimited Terminal</h2>
            <div class="text-7xl font-black mb-8 text-blue-500">$11 <span class="text-xl text-slate-600 font-medium">/ mo</span></div>
            <a href="https://halftotake.gumroad.com/l/hahanq" target="_blank" class="inline-block bg-blue-600 text-white px-20 py-5 rounded-2xl font-black uppercase text-xs tracking-widest shadow-2xl hover:bg-white hover:text-blue-600 transition">Establish Connection</a>
        </section>

        <!-- Coffee -->
        <section class="coffee-box p-12 text-center shadow-2xl mb-32 border-2 border-white/10 transform hover:scale-[1.02] transition">
            <i class="fa-solid fa-mug-hot text-5xl mb-6"></i>
            <h2 class="text-3xl font-black mb-4 tracking-tighter">Support AI Research</h2>
            <a href="https://www.buymeacoffee.com/djawjdaks8g" target="_blank" class="inline-block bg-black text-white px-10 py-4 rounded-full font-black text-sm hover:bg-slate-800 transition">Buy us a coffee ☕</a>
        </section>
    </main>

    <!-- Config Modal -->
    <div id="modal" class="fixed inset-0 z-[300] hidden bg-black/90 backdrop-blur-xl flex items-center justify-center p-6 text-center">
        <div class="bg-slate-900 w-full max-w-sm rounded-[3.5rem] p-12 border border-slate-800 shadow-3xl">
            <h2 class="text-3xl font-black mb-2 italic tracking-tighter">Console Config</h2>
            <input type="password" id="uKeyIn" class="w-full bg-slate-800 border-none rounded-2xl p-5 text-xs font-bold text-white mb-6 outline-none" placeholder="Paste Gemini API Key">
            <div class="grid grid-cols-2 gap-3"><button id="save" class="bg-blue-600 text-white py-4 rounded-xl font-black text-xs">Connect</button><button id="close" class="bg-slate-800 text-slate-500 py-4 rounded-xl font-black text-xs">Close</button></div>
        </div>
    </div>

    <script>
        let currentResLines = [];
        const input = document.getElementById('inputText');
        const modal = document.getElementById('modal');
        const userKey = localStorage.getItem('tp_key');

        document.getElementById('openConfig').onclick = () => modal.classList.remove('hidden');
        document.getElementById('close').onclick = () => modal.classList.add('hidden');
        document.getElementById('save').onclick = () => { localStorage.setItem('tp_key', document.getElementById('uKeyIn').value); location.reload(); };

        if(userKey) {
            document.getElementById('statusTag').innerText = "UNLIMITED KEY ACTIVE";
            document.getElementById('statusTag').className = "text-[9px] font-black uppercase tracking-widest bg-emerald-500/10 text-emerald-500 px-4 py-1.5 rounded-full border border-emerald-500/20";
        }

        input.addEventListener('input', () => {
            const len = input.value.length;
            document.getElementById('buffer').innerText = `Signal Buffer: ${len} / 100`;
            if(!userKey) document.getElementById('buffer').style.color = len > 100 ? '#ef4444' : '#64748b';
        });

        async function executeAnalysis() {
            const text = input.value;
            if(!text) return;
            if(!userKey && text.length > 100) { alert("Buffer limit exceeded."); return; }
            const btn = document.getElementById('runBtn');
            btn.disabled = true; btn.innerHTML = '<i class="fa-solid fa-sync fa-spin"></i>';

            try {
                let data;
                const src = document.getElementById('srcLang').value;
                const target = document.getElementById('targetLang').value;
                const mode = document.getElementById('pMode').value;

                if (userKey) {
                    const prompt = `Linguistic analysis from ${src} to ${target}. Mode: ${mode}.
                    RULE: if learn mode, write phonetic of ${target} using ${src} script. (Ex: "Hello" -> "헬로우")
                    if teach mode, write phonetic of ${src} using ${target} script. (Ex: "안녕" -> "Annyeong")
                    Return ONLY valid JSON: {"lines": [{"original": "...", "phonetic": "...", "translation": "..."}]}. Input: ${text}`;

                    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${userKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                    });
                    const j = await res.json();
                    data = JSON.parse(j.candidates[0].content.parts[0].text.match(/\{[\s\S]*\}/)[0]);
                } else {
                    const res = await fetch('/api/translate', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ text, src, target, mode })
                    });
                    data = await res.json();
                }

                currentResLines = data.lines || [data];
                renderUI();
                document.getElementById('resultArea').classList.remove('hidden');
                window.scrollTo({ top: document.getElementById('resultArea').offsetTop - 120, behavior: 'smooth' });

            } catch (e) { alert("Terminal Error. Retry."); console.error(e); }
            finally { btn.disabled = false; btn.innerText = "Analyze Now"; }
        }

        function renderUI() {
            const o = document.getElementById('shOri').checked;
            const p = document.getElementById('shPho').checked;
            const t = document.getElementById('shTra').checked;
            let html = "";
            currentResLines.forEach(l => {
                if(o) html += `<div class="text-[12px] text-slate-600 mb-1 font-bold italic opacity-60 uppercase tracking-widest">${l.original}</div>`;
                if(p) html += `<div class="text-blue-400 mb-1 font-black">${l.phonetic}</div>`;
                if(t) html += `<div class="text-white mb-12 font-black">${l.translation}</div>`;
            });
            document.getElementById('masterMonitor').innerHTML = html;
        }

        function copyMaster() { navigator.clipboard.writeText(document.getElementById('masterMonitor').innerText); alert("Signal Captured."); }
    </script>
</body>
</html>
